[startkit]
id = "vibewbz.startkit"
name = "VibeWbz Startkit"
schema = 1
version = "0.1.0"

[runner]
default_timeout_secs = 1200
log_redact_keys = ["token", "api_key", "secret", "password"]

[sources.global]
label = "Global"
node_index = "https://nodejs.org/dist/index.json"
node_dist = "https://nodejs.org/dist"
npm_registry = "https://registry.npmjs.org"

[sources.cn]
label = "China mirror"
node_index = "https://npmmirror.com/mirrors/node/index.json"
node_dist = "https://npmmirror.com/mirrors/node"
npm_registry = "https://registry.npmmirror.com"

[[items]]
id = "essentials.node"
label = "Node.js"
group = "computer"
category = "essentials"
description = "System Node.js runtime for Claude Code and Codex CLI."
platforms = ["macos", "windows"]
include_if = ["agent:claude", "agent:codex"]
severity = "blocker"
min_version = "22.0.0"

[items.detect]
macos = "scripts/macos/detect-node.sh"
windows = "scripts/windows/detect-node.ps1"

[[items]]
id = "agents.codex.cli"
label = "Codex CLI"
group = "agents"
category = "agents"
description = "OpenAI Codex CLI from PATH or Startkit npm install."
platforms = ["macos", "windows"]
include_if = ["agent:codex"]
depends_on = ["essentials.node"]
severity = "blocker"
program = "codex"
version_arg = "--version"

[[items]]
id = "agents.claude.cli"
label = "Claude Code"
group = "agents"
category = "agents"
description = "Anthropic Claude Code from PATH or Startkit npm install."
platforms = ["macos", "windows"]
include_if = ["agent:claude"]
depends_on = ["essentials.node"]
severity = "blocker"
program = "claude"
version_arg = "--version"
