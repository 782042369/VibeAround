package = "@anthropic-ai/claude-code"
[agents.claude.sources.npm_global.install]
macos = "npm install -g @anthropic-ai/claude-code@latest"
linux = "npm install -g @anthropic-ai/claude-code@latest"
windows = "npm install -g @anthropic-ai/claude-code@latest"
[agents.claude.sources.npm_global.upgrade]
macos = "npm install -g @anthropic-ai/claude-code@latest"
linux = "npm install -g @anthropic-ai/claude-code@latest"
windows = "npm install -g @anthropic-ai/claude-code@latest"

[agents.claude.sources.homebrew_cask]
label = "Homebrew cask"
[agents.claude.sources.homebrew_cask.upgrade]
macos = "brew upgrade --cask claude-code"

[agents.claude.sources.native]
label = "Native installer"
[agents.claude.sources.native.install]
