name: Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-desktop:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Windows x64
            runner: windows-latest
            args: --bundles nsis
          - name: macOS arm64
            runner: macos-15
            args: --bundles dmg
          - name: macOS x64
            runner: macos-15-intel
            args: --bundles dmg

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Install Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src -> target

      - name: Install frontend dependencies
        run: bun install --cwd src --frozen-lockfile

      - name: Resolve release metadata
        id: release
        shell: bash
        run: |
          VERSION="$(node -p "require('./src/desktop/package.json').version")"
          if [ "${GITHUB_REF_TYPE}" = "tag" ]; then
            TAG="${GITHUB_REF_NAME}"
          else
            TAG="v${VERSION}"
          fi
          ARGS="${{ matrix.args }}"
          echo "version=${VERSION}" >> "${GITHUB_OUTPUT}"
          echo "tag=${TAG}" >> "${GITHUB_OUTPUT}"
          echo "args=${ARGS}" >> "${GITHUB_OUTPUT}"

      - name: Build and upload release assets
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: src/desktop
          tauriScript: bun tauri
          tagName: ${{ steps.release.outputs.tag }}
          releaseName: VibeWbz ${{ steps.release.outputs.tag }}
          releaseBody: |
            VibeWbz desktop release.

            Assets built by GitHub Actions:
            - Windows x64 installer
            - macOS DMG for Apple Silicon and Intel
          releaseDraft: true
          prerelease: false
          args: ${{ steps.release.outputs.args }}

      - name: Normalize release asset names
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.release.outputs.tag }}
          VERSION: ${{ steps.release.outputs.version }}
        run: |
          set -euo pipefail
          rename_asset() {
            local from="$1"
            local to="$2"
            local id
            id="$(gh release view "${TAG}" --json assets --jq ".assets[] | select(.name == \"${from}\") | .id" || true)"
            if [ -z "${id}" ]; then
              return 0
            fi
            gh api \
              --method PATCH \
              -H "Accept: application/vnd.github+json" \
              "/repos/${GITHUB_REPOSITORY}/releases/assets/${id}" \
              -f "name=${to}" >/dev/null
          }

          if [ "${RUNNER_OS}" = "Windows" ]; then
            rename_asset "VibeWbz_${VERSION}_x64-setup.exe" "VibeWbz_${VERSION}_windows-x64-installer-nsis.exe"
          elif [ "${RUNNER_OS}" = "macOS" ] && [ "${RUNNER_ARCH}" = "ARM64" ]; then
            rename_asset "VibeWbz_${VERSION}_aarch64.dmg" "VibeWbz_${VERSION}_macos-arm64.dmg"
          elif [ "${RUNNER_OS}" = "macOS" ] && [ "${RUNNER_ARCH}" = "X64" ]; then
            rename_asset "VibeWbz_${VERSION}_x64.dmg" "VibeWbz_${VERSION}_macos-x64.dmg"
          fi
